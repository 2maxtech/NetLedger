<h2 style="color:#111827;font-size:20px;margin:0 0 16px;">Invoice Generated</h2>
<p style="color:#374151;font-size:14px;line-height:1.6;margin:0 0 16px;">
  Hi {{ customer_name }},
</p>
<p style="color:#374151;font-size:14px;line-height:1.6;margin:0 0 24px;">
  Your invoice for <strong>{{ plan_name }}</strong> has been generated.
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
  <tr>
    <td style="padding:12px 16px;background-color:#f9fafb;border-radius:8px;">
      <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td style="color:#6b7280;font-size:13px;padding:4px 0;">Amount Due</td>
          <td align="right" style="color:#111827;font-size:16px;font-weight:600;padding:4px 0;">{{ amount }}</td>
        </tr>
        <tr>
          <td style="color:#6b7280;font-size:13px;padding:4px 0;">Due Date</td>
          <td align="right" style="color:#111827;font-size:14px;padding:4px 0;">{{ due_date }}</td>
        </tr>
        <tr>
          <td style="color:#6b7280;font-size:13px;padding:4px 0;">Plan</td>
          <td align="right" style="color:#111827;font-size:14px;padding:4px 0;">{{ plan_name }}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% if portal_url %}
<p style="text-align:center;margin:0 0 16px;">
  <a href="{{ portal_url }}" style="display:inline-block;padding:12px 32px;background-color:{{ primary_color | default('#e8700a') }};color:#ffffff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;">View Invoice</a>
</p>
{% endif %}
