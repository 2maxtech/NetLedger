services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netbill
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set — create .env on this host with DB_PASSWORD=<current-db-password>}
      POSTGRES_DB: netbill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:${DB_PASSWORD:?DB_PASSWORD not set — create .env on this host with DB_PASSWORD=<current-db-password>}@db:5432/netbill
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      MIKROTIK_URL: http://192.168.40.30
      MIKROTIK_USER: admin
      MIKROTIK_PASSWORD: SeafoodCity12#

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:${DB_PASSWORD:?DB_PASSWORD not set — create .env on this host with DB_PASSWORD=<current-db-password>}@db:5432/netbill
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      MIKROTIK_URL: http://192.168.40.30
      MIKROTIK_USER: admin
      MIKROTIK_PASSWORD: SeafoodCity12#

  celery-beat:
    build:
      context: ./backend
    command: celery -A app.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:${DB_PASSWORD:?DB_PASSWORD not set — create .env on this host with DB_PASSWORD=<current-db-password>}@db:5432/netbill
      REDIS_URL: redis://redis:6379/0

volumes:
  pgdata:
  uploads:
