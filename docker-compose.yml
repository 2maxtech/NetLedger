services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netbill
      POSTGRES_PASSWORD: netbill
      POSTGRES_DB: netbill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:netbill@db:5432/netbill
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      MIKROTIK_URL: https://192.168.40.50
      MIKROTIK_USER: admin
      MIKROTIK_PASSWORD: ""

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:netbill@db:5432/netbill
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      MIKROTIK_URL: https://192.168.40.50
      MIKROTIK_USER: admin
      MIKROTIK_PASSWORD: ""

  celery-beat:
    build:
      context: ./backend
    command: celery -A app.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://netbill:netbill@db:5432/netbill
      REDIS_URL: redis://redis:6379/0

volumes:
  pgdata:
