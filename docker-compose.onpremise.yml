services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-netledger}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-netledger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      DEPLOYMENT_MODE: onpremise
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-netledger}:${DB_PASSWORD}@db:5432/${DB_NAME:-netledger}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      BASE_URL: ${BASE_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DEPLOYMENT_MODE: onpremise
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - db
      - redis
    environment:
      DEPLOYMENT_MODE: onpremise
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-netledger}:${DB_PASSWORD}@db:5432/${DB_NAME:-netledger}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    depends_on:
      - db
      - redis
    environment:
      DEPLOYMENT_MODE: onpremise
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-netledger}:${DB_PASSWORD}@db:5432/${DB_NAME:-netledger}
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
