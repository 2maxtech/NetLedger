<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" fill="none">
  <defs>
    <!-- Cyan glow for the X -->
    <filter id="xglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle white glow for 2m -->
    <filter id="textglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for 2m text (white top to light gray bottom for 3D feel) -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <!-- Cyan gradient for X -->
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- "2m" text -->
  <g filter="url(#textglow)">
    <text x="18" y="82" font-family="'Inter', 'Arial Black', 'Segoe UI', sans-serif" font-weight="900" font-size="80" fill="url(#textGrad)" letter-spacing="-4">2m</text>
  </g>

  <!-- "X" with neon glow -->
  <g filter="url(#xglow)" transform="translate(183, 10)">
    <!-- X shape - two thick crossed strokes -->
    <path d="M8 8 L42 55 L8 102 L26 102 L52 66 L78 102 L96 102 L62 55 L96 8 L78 8 L52 44 L26 8 Z" fill="url(#cyanGrad)"/>
  </g>
</svg>
